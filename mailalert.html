<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>接近案内メール | 柳町循環バス</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh}

.top-bar{background:#F26F21;padding:10px 1rem;display:flex;align-items:center;gap:8px}
.top-bar a{color:#fff;font-size:13px;font-weight:600;text-decoration:none}
.top-bar span{color:#fff;font-size:13px;margin-left:auto;opacity:.85}

.wrap{max-width:480px;margin:0 auto;padding:1rem 1rem 3rem}

.section-head{font-size:13px;font-weight:700;color:#F26F21;text-transform:uppercase;letter-spacing:.06em;margin:.25rem 0 .6rem;padding-left:2px}

.card{background:#fff;border-radius:14px;border:1.5px solid #e8e6e0;padding:1.25rem;margin-bottom:1rem}

label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:.35rem}
select,input[type=email]{
  width:100%;padding:10px 12px;font-size:15px;
  border:1.5px solid #e0deda;border-radius:9px;
  background:#fff;color:#1a1a1a;outline:none;font-family:inherit;
  appearance:none;-webkit-appearance:none;
}
select:focus,input[type=email]:focus{border-color:#F26F21}

.form-group{margin-bottom:1rem}
.form-group:last-child{margin-bottom:0}

.hint{font-size:12px;color:#aaa;margin-top:.3rem}

.time-list{display:flex;flex-wrap:wrap;gap:7px;margin-top:.5rem}
.time-btn{
  padding:7px 12px;font-size:14px;font-variant-numeric:tabular-nums;
  border:1.5px solid #e0deda;border-radius:8px;
  background:#fff;cursor:pointer;color:#1a1a1a;font-family:inherit;
  transition:border-color .1s,background .1s;
}
.time-btn:hover{border-color:#F26F21;background:#FFF0E6}
.time-btn.selected{border-color:#F26F21;background:#F26F21;color:#fff;font-weight:700}
.time-btn.passed{color:#ccc;border-color:#eee}
.time-btn.next{border-color:#F26F21;background:#FFF0E6;font-weight:700}
.time-btn[data-general="1"]::after{content:"一般";font-size:9px;background:#E67E00;color:#fff;padding:1px 3px;border-radius:3px;margin-left:3px;vertical-align:middle;}

.submit-btn{
  width:100%;padding:13px;font-size:16px;font-weight:700;
  border:none;border-radius:10px;background:#F26F21;color:#fff;
  cursor:pointer;font-family:inherit;margin-top:.25rem;
  transition:background .15s;
}
.submit-btn:hover{background:#d45e15}
.submit-btn:disabled{background:#e0deda;color:#aaa;cursor:default}

/* 登録済みリスト */
.reg-list{display:flex;flex-direction:column;gap:.6rem}
.reg-item{
  display:flex;align-items:center;gap:10px;
  background:#FFF8F4;border:1.5px solid #FDDCC7;border-radius:10px;
  padding:.75rem 1rem;
}
.reg-icon{width:34px;height:34px;background:#F26F21;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.reg-body{flex:1;min-width:0}
.reg-title{font-size:13px;font-weight:700;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.reg-sub{font-size:11px;color:#888;margin-top:2px}
.reg-del{
  background:#FEE8E8;border:1.5px solid #F5B8B8;border-radius:7px;
  font-size:12px;font-weight:600;color:#C0392B;cursor:pointer;
  padding:5px 10px;flex-shrink:0;font-family:inherit;
  transition:background .1s;
}
.reg-del:hover{background:#F5B8B8}

.empty-msg{font-size:13px;color:#bbb;text-align:center;padding:1.5rem 0}

/* 成功トースト */
.toast{
  position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);
  background:#1a1a1a;color:#fff;font-size:13px;font-weight:600;
  padding:10px 20px;border-radius:24px;white-space:nowrap;
  opacity:0;transition:opacity .3s;pointer-events:none;z-index:99;
}
.toast.show{opacity:1}

/* 認証フォーム */
.auth-card{background:#fff;border-radius:14px;border:1.5px solid #e8e6e0;padding:1.25rem;margin-bottom:1rem}
.auth-card .section-head{margin-bottom:.75rem}
input[type=password]{
  width:100%;padding:10px 12px;font-size:15px;
  border:1.5px solid #e0deda;border-radius:9px;
  background:#fff;color:#1a1a1a;outline:none;font-family:inherit;
}
input[type=password]:focus{border-color:#F26F21}
.auth-btn{
  width:100%;padding:11px;font-size:15px;font-weight:700;
  border:none;border-radius:9px;background:#F26F21;color:#fff;
  cursor:pointer;font-family:inherit;margin-top:.75rem;
  transition:background .15s;
}
.auth-btn:hover{background:#d45e15}
.auth-btn:disabled{background:#e0deda;color:#aaa;cursor:default}
.auth-error{font-size:12px;color:#C0392B;margin-top:.4rem;display:none}
.auth-ok-bar{
  display:flex;align-items:center;justify-content:space-between;
  background:#FFF8F4;border:1.5px solid #FDDCC7;border-radius:10px;
  padding:.6rem 1rem;margin-bottom:.75rem;font-size:13px;color:#888;
}
.auth-ok-bar strong{color:#F26F21}
.signout-btn{font-size:12px;color:#C0392B;background:none;border:none;cursor:pointer;font-family:inherit;padding:0}
.tab-row{display:flex;gap:0;margin-bottom:1rem;border-radius:10px;overflow:hidden;border:1.5px solid #e8e6e0}
.tab-row button{flex:1;padding:10px;font-size:14px;font-weight:600;border:none;background:#fff;color:#888;cursor:pointer;font-family:inherit;transition:background .1s,color .1s}
.tab-row button.active{background:#F26F21;color:#fff}
.tab-row button:not(.active):hover{background:#FFF0E6;color:#F26F21}
.pass-hint{font-size:11px;color:#aaa;margin-top:.25rem}
</style>
</head>
<body>

<div class="top-bar">
  <a href="Busloctop.html">&#8249; ホームに戻る</a>
  <span>接近案内メール</span>
</div>

<div class="wrap">

  <!-- ログイン / アカウント登録フォーム（未認証時） -->
  <div class="auth-card" id="auth-form">

    <!-- タブ切り替え -->
    <div class="tab-row">
      <button id="tab-login" class="active" onclick="switchAuthTab('login')">ログイン</button>
      <button id="tab-signup" onclick="switchAuthTab('signup')">新規アカウント登録</button>
    </div>

    <!-- ログインパネル -->
    <div id="panel-login">
      <div class="form-group">
        <label for="auth-email">メールアドレス</label>
        <input type="email" id="auth-email" placeholder="登録済みのメールアドレス" autocomplete="email">
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label for="auth-pass">パスワード</label>
        <input type="password" id="auth-pass" placeholder="パスワードを入力">
        <div class="auth-error" id="auth-error"></div>
      </div>
      <button class="auth-btn" id="auth-btn">ログイン</button>
    </div>

    <!-- 新規アカウント登録パネル -->
    <div id="panel-signup" style="display:none">
      <div class="form-group">
        <label for="signup-email">メールアドレス</label>
        <input type="email" id="signup-email" placeholder="example@mail.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="signup-pass">パスワード（8文字以上）</label>
        <input type="password" id="signup-pass" placeholder="パスワードを設定">
        <div class="pass-hint">英数字・記号が使えます</div>
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label for="signup-pass2">パスワード（確認）</label>
        <input type="password" id="signup-pass2" placeholder="もう一度入力">
        <div class="auth-error" id="signup-error"></div>
      </div>
      <button class="auth-btn" id="signup-btn">アカウントを作成</button>
    </div>

  </div>

  <!-- 認証済み表示（認証後に表示） -->
  <div id="reg-section" style="display:none">
    <div class="auth-ok-bar">
      <span><strong id="auth-email-disp"></strong> でログイン中</span>
      <button class="signout-btn" id="signout-btn">ログアウト</button>
    </div>

    <!-- 新規登録フォーム -->
    <div class="card">
      <div class="section-head">新規登録</div>

      <div class="form-group">
        <label for="stop-sel">乗車停留所</label>
        <select id="stop-sel">
          <option value="">停留所を選択してください</option>
        </select>
      </div>

      <div class="form-group" id="time-group" style="display:none">
        <label>便（発車時刻）</label>
        <div class="time-list" id="time-list"></div>
        <div class="hint">乗りたい便をタップして選択</div>
        <div id="general-note" style="display:none;align-items:center;gap:6px;background:#FFF8E6;border:1.5px solid #FFDDA0;border-radius:8px;padding:7px 10px;margin-top:6px;font-size:12px;color:#8A5C00;">
          <span style="font-size:14px;">⚠️</span>
          <span>この便は<strong>一般車による運行</strong>です。車両・設備が通常と異なる場合があります。</span>
        </div>
      </div>

      <button class="submit-btn" id="reg-btn" disabled>登録する</button>
    </div>

    <!-- 登録済み一覧 -->
    <div class="section-head" style="margin-top:.5rem">登録済み案内</div>
    <div class="card" style="padding:1rem">
      <div class="reg-list" id="reg-list">
        <div class="empty-msg">読み込み中…</div>
      </div>
    </div>
  </div>



</div>

<div class="toast" id="toast"></div>

function timeToMins(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function getNow(){const n=new Date();return n.getHours()*60+n.getMinutes()+n.getSeconds()/60;}

const GAS_URL = 'https://script.google.com/macros/s/AKfycbzUSWqxX6CLS-2ebkytQZfM4QZ_ffYLQCoP2yXO-siNXOHIKB82PPnfR47b2jvkeaaW/exec';

/* GAS API 呼び出し共通 */
async function gasCall(payload) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify(payload),
  });
  return res.json();
}

/* ローカルキャッシュ（一覧表示用） */
let regCache = [];

let selectedTime = null;
let selectedBusIdx = -1;

/* 停留所セレクト初期化 */
const stopSel = document.getElementById('stop-sel');
BOARDING_STOPS.forEach(s => {
  const opt = document.createElement('option');
  opt.value = s.name;
  opt.textContent = s.name;
  stopSel.appendChild(opt);
});

/* 停留所が選ばれたら便一覧を表示 */
stopSel.addEventListener('change', () => {
  selectedTime = null;
  const sName = stopSel.value;
  const group = document.getElementById('time-group');
  const list  = document.getElementById('time-list');
  list.innerHTML = '';
  if (!sName) { group.style.display='none'; checkBtn(); return; }

  const times = TIMETABLE[sName] || [];
  const now   = getNow();
  let firstFuture = true;

  times.forEach((t, idx) => {
    const diff = timeToMins(t) - now;
    const btn  = document.createElement('button');
    btn.className = 'time-btn';
    btn.textContent = t;
    btn.dataset.time = t;
    if (diff < -5) {
      btn.classList.add('passed');
    } else if (firstFuture && diff >= 0) {
      btn.classList.add('next');
      firstFuture = false;
    }
    // 63,65,67,69,71,73便（0始まりインデックス: 62,64,66,68,70,72）は全停留所で一般車
    const GENERAL_BUS_IDX = new Set([62,64,66,68,70,72]);
    if (GENERAL_BUS_IDX.has(idx)) {
      btn.dataset.general = '1';
      btn.title = '一般車による運行（63・65・67・69・71・73便）';
    }
    btn.addEventListener('click', () => {
      document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedTime = t;
      selectedBusIdx = idx;
      // 一般車注意書き表示
      const note = document.getElementById('general-note');
      if (btn.dataset.general === '1') note.style.display='flex';
      else note.style.display='none';
      checkBtn();
    });
    list.appendChild(btn);
  });

  group.style.display = 'block';
  checkBtn();
});

function checkBtn(){
  const ok = stopSel.value && selectedTime && !!authedEmail;
  document.getElementById('reg-btn').disabled = !ok;
}

/* 登録ボタン */
document.getElementById('reg-btn').addEventListener('click', async () => {
  const stop  = stopSel.value;
  const time  = selectedTime;
  const email = authedEmail;
  const days  = [...document.querySelectorAll('.day-btn.active')].map(b => b.dataset.day);
  if (!stop || !time || !email) { showToast('ログインが必要です'); return; }

  // 重複チェック（キャッシュ）
  if (regCache.some(r => r.stop===stop && r.time===time && r.email===email)) {
    showToast('すでに同じ内容が登録されています');
    return;
  }

  const btn = document.getElementById('reg-btn');
  btn.disabled = true;
  btn.textContent = '登録中…';

  const isGeneral = new Set([62,64,66,68,70,72]).has(selectedBusIdx);
  // 曜日未選択の場合は全曜日
  const sendDays = days.length ? days : ['日','月','火','水','木','金','土'];

  try {
    const json = await gasCall({ action:'register', stop, time, email, days: sendDays, general: isGeneral });
    if (json.ok) {
      showToast(`${stop} ${time}発 の案内を登録しました`);
      await loadRegList();
    } else {
      showToast('登録に失敗しました: ' + (json.error||''));
    }
  } catch(e) {
    showToast('通信エラーが発生しました');
  }

  btn.textContent = '登録する';
  // リセット
  stopSel.value = '';
  document.getElementById('time-group').style.display = 'none';
  document.getElementById('general-note').style.display = 'none';
  selectedTime = null;
  selectedBusIdx = -1;
  checkBtn();
});



/* 認証状態 */
let authedEmail = null;

/* 登録済みリスト：認証済みメールのみ取得 */
async function loadRegList() {
  if (!authedEmail) return;
  const list = document.getElementById('reg-list');
  list.innerHTML = '<div class="empty-msg">読み込み中…</div>';
  try {
    const json = await gasCall({ action: 'list', email: authedEmail });
    regCache = (json.list || []).filter(r => r.email === authedEmail);
    renderRegList(regCache);
  } catch(e) {
    list.innerHTML = '<div class="empty-msg">読み込みに失敗しました</div>';
  }
}

function renderRegList(regs) {
  const list = document.getElementById('reg-list');
  if (!regs || !regs.length) {
    list.innerHTML = '<div class="empty-msg" id="empty-msg">登録された案内はありません</div>';
    return;
  }
  list.innerHTML = regs.map(r => `
    <div class="reg-item">
      <div class="reg-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <rect x="2" y="5" width="16" height="11" rx="2" fill="white" opacity=".9"/>
          <rect x="3" y="7" width="5" height="3" rx="1" fill="#F26F21"/>
          <rect x="10" y="7" width="5" height="3" rx="1" fill="#F26F21"/>
          <circle cx="5" cy="16" r="1.5" fill="white"/>
          <circle cx="15" cy="16" r="1.5" fill="white"/>
        </svg>
      </div>
      <div class="reg-body">
        <div class="reg-title">${escH(r.stop)}　${escH(r.time)} 発</div>
        <div class="reg-sub">${escH(r.email)}　｜　${escH((r.days||[]).join('・'))}曜日${r.general==='true'||r.general===true?' <span style="color:#E67E00;font-weight:600;">※一般車</span>':''}</div>
      </div>
      <button class="reg-del" data-id="${escH(r.id)}" title="案内をキャンセル">キャンセル</button>
    </div>
  `).join('');

  list.querySelectorAll('.reg-del').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.id;
      const reg = regCache.find(r => String(r.id) === String(id));
      if (!reg) return;
      if (!confirm(`${reg.stop} ${reg.time}発 の案内登録をキャンセルしますか？`)) return;
      btn.disabled = true;
      btn.textContent = '…';
      try {
        await gasCall({ action: 'delete', id });
        showToast('案内登録をキャンセルしました');
        await loadRegList();
      } catch(e) {
        showToast('通信エラーが発生しました');
      }
    });
  });
}

function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

/* タブ切り替え */
function switchAuthTab(tab) {
  document.getElementById('panel-login').style.display  = tab === 'login'  ? 'block' : 'none';
  document.getElementById('panel-signup').style.display = tab === 'signup' ? 'block' : 'none';
  document.getElementById('tab-login').classList.toggle('active',  tab === 'login');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  document.getElementById('auth-error').style.display   = 'none';
  document.getElementById('signup-error').style.display = 'none';
}

/* アカウント登録ボタン */
document.getElementById('signup-btn').addEventListener('click', async () => {
  const email  = document.getElementById('signup-email').value.trim();
  const pass   = document.getElementById('signup-pass').value;
  const pass2  = document.getElementById('signup-pass2').value;
  const errEl  = document.getElementById('signup-error');
  const btn    = document.getElementById('signup-btn');

  errEl.style.display = 'none';

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    errEl.textContent = '正しいメールアドレスを入力してください';
    errEl.style.display = 'block'; return;
  }
  if (pass.length < 8) {
    errEl.textContent = 'パスワードは8文字以上にしてください';
    errEl.style.display = 'block'; return;
  }
  if (pass !== pass2) {
    errEl.textContent = 'パスワードが一致しません';
    errEl.style.display = 'block'; return;
  }

  btn.disabled = true;
  btn.textContent = '登録中…';

  try {
    const json = await gasCall({ action: 'signup', email, pass });
    if (json.ok) {
      showToast('アカウントを作成しました。ログインしてください');
      document.getElementById('signup-email').value = '';
      document.getElementById('signup-pass').value  = '';
      document.getElementById('signup-pass2').value = '';
      // ログインタブに自動切り替え＆メールアドレスをセット
      switchAuthTab('login');
      document.getElementById('auth-email').value = email;
      document.getElementById('auth-pass').focus();
    } else {
      errEl.textContent = json.error || '登録に失敗しました';
      errEl.style.display = 'block';
    }
  } catch(e) {
    errEl.textContent = '通信エラーが発生しました';
    errEl.style.display = 'block';
  }

  btn.disabled = false;
  btn.textContent = 'アカウントを作成';
});

/* Enterキーでアカウント登録 */
['signup-email','signup-pass','signup-pass2'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('signup-btn').click();
  });
});

/* 認証ボタン */
document.getElementById('auth-btn').addEventListener('click', async () => {
  const email = document.getElementById('auth-email').value.trim();
  const pass  = document.getElementById('auth-pass').value;
  const errEl = document.getElementById('auth-error');
  const btn   = document.getElementById('auth-btn');
  if (!email || !pass) return;

  btn.disabled = true;
  btn.textContent = '確認中…';
  errEl.style.display = 'none';

  try {
    const json = await gasCall({ action: 'auth', email, pass });
    if (json.ok) {
      authedEmail = email;
      document.getElementById('auth-form').style.display = 'none';
      document.getElementById('reg-section').style.display = 'block';
      document.getElementById('auth-email-disp').textContent = email;
      await loadRegList();
    } else {
      if (json.reason === 'not_found') {
        errEl.textContent = 'このメールアドレスは登録されていません';
      } else {
        errEl.textContent = 'パスワードが違います';
      }
      errEl.style.display = 'block';
    }
  } catch(e) {
    errEl.textContent = '通信エラーが発生しました';
    errEl.style.display = 'block';
  }

  btn.disabled = false;
  btn.textContent = '確認する';
});

/* Enterキーでログイン */
['auth-email','auth-pass'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('auth-btn').click();
  });
});

/* ログアウト */
document.getElementById('signout-btn').addEventListener('click', () => {
  authedEmail = null;
  regCache = [];
  document.getElementById('auth-form').style.display = 'block';
  document.getElementById('reg-section').style.display = 'none';
  document.getElementById('auth-email').value = '';
  document.getElementById('auth-pass').value = '';
  document.getElementById('auth-error').style.display = 'none';
});
</script>
</body>
</html>
