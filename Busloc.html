<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>時刻表・接近情報 | 柳町循環バス</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  background: #f5f5f0;
  color: #1a1a1a;
  min-height: 100vh;
  padding: 1rem;
}
.wrap { max-width: 600px; margin: 0 auto; }

/* ヘッダー */
.header {
  background: #fff; border: 1px solid #e0e0da; border-radius: 12px;
  padding: 1rem 1.25rem; margin-bottom: 1rem;
  display: flex; align-items: center; gap: 12px;
}
.bus-icon {
  width: 38px; height: 38px; background: #1D9E75; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.header-title { font-size: 16px; font-weight: 600; color: #1a1a1a; }
.header-sub   { font-size: 12px; color: #888; margin-top: 2px; }
.clock {
  margin-left: auto; font-size: 20px; font-weight: 600; color: #1D9E75;
  font-variant-numeric: tabular-nums;
}

/* タブ */
.tabs {
  display: flex; gap: 0; margin-bottom: 1rem;
  background: #fff; border: 1px solid #e0e0da; border-radius: 10px; overflow: hidden;
}
.tab-btn {
  flex: 1; padding: 10px; font-size: 14px; font-weight: 500;
  border: none; background: transparent; cursor: pointer; color: #888;
  font-family: inherit; transition: background .1s, color .1s;
  border-right: 1px solid #e0e0da;
}
.tab-btn:last-child { border-right: none; }
.tab-btn.active { background: #1D9E75; color: #fff; }
.tab-btn:not(.active):hover { background: #f5f5f0; color: #1a1a1a; }

/* 共通カード */
.screen {
  background: #fff; border: 1px solid #e0e0da; border-radius: 12px; padding: 1.25rem;
}

/* フォーム部品 */
.step-label {
  font-size: 11px; color: #aaa; text-transform: uppercase;
  letter-spacing: .08em; margin-bottom: .4rem;
}
.search-row { display: flex; gap: 8px; margin-bottom: .5rem; }
.search-row input {
  flex: 1; padding: 9px 12px; font-size: 14px;
  border: 1px solid #d0d0ca; border-radius: 8px;
  background: #fff; color: #1a1a1a; outline: none; font-family: inherit;
}
.search-row input:focus { border-color: #1D9E75; }
.search-row button {
  padding: 9px 16px; font-size: 14px; font-weight: 500;
  border: 1px solid #1D9E75; border-radius: 8px;
  background: #E1F5EE; color: #0F6E56; cursor: pointer;
  white-space: nowrap; font-family: inherit; transition: background .1s;
}
.search-row button:hover { background: #9FE1CB; }

.selected-stop { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.selected-name { font-size: 13px; font-weight: 600; }
.selected-name.from { color: #0F6E56; }
.selected-name.to   { color: #A32D2D; }
.clear-btn {
  font-size: 11px; color: #aaa; cursor: pointer; margin-left: 4px;
  padding: 2px 5px; border-radius: 4px; border: none;
  background: transparent; font-family: inherit;
}
.clear-btn:hover { color: #555; background: #f0f0ea; }

.stop-list {
  display: flex; flex-direction: column; gap: 3px;
  max-height: 220px; overflow-y: auto; margin-bottom: .5rem;
}
.stop-item {
  padding: 9px 13px; border: 1px solid #e8e8e2; border-radius: 8px;
  cursor: pointer; font-size: 14px; color: #1a1a1a;
  display: flex; align-items: center; gap: 8px; transition: background .1s;
}
.stop-item:hover { background: #f5f5f0; }
.stop-item .kana { font-size: 11px; color: #bbb; margin-left: auto; }
.stop-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.stop-dot.green { background: #1D9E75; }
.stop-dot.red   { background: #E24B4A; }

.no-result { font-size: 13px; color: #aaa; padding: 6px 2px; margin-bottom: .5rem; }
.divider { border: none; border-top: 1px solid #eee; margin: 1rem 0; }

.search-btn {
  width: 100%; padding: 11px; font-size: 15px; font-weight: 600;
  border: none; border-radius: 8px; background: #1D9E75; color: #fff;
  cursor: pointer; font-family: inherit; transition: background .1s;
}
.search-btn:hover:not(:disabled) { background: #0F6E56; }
.search-btn:disabled { background: #e0e0da; color: #aaa; cursor: default; }

.error-box {
  background: #FCEBEB; border: 1px solid #F09595; border-radius: 10px;
  padding: .9rem 1.1rem; color: #A32D2D; font-size: 14px;
  line-height: 1.6; margin-top: .75rem;
}
.error-box small { font-size: 12px; opacity: .75; display: block; margin-top: 3px; }

.back-btn {
  display: flex; align-items: center; gap: 5px;
  font-size: 13px; color: #888; cursor: pointer; margin-bottom: 1rem;
  background: none; border: none; padding: 0; font-family: inherit;
}
.back-btn:hover { color: #1a1a1a; }

/* 接近情報 */
.route-summary {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 1rem;
}
.route-chip {
  display: flex; align-items: center; gap: 6px;
  background: #f5f5f0; padding: 6px 10px;
  border-radius: 8px; border: 1px solid #e0e0da;
  font-size: 13px; font-weight: 500; color: #1a1a1a;
}
.route-arrow { color: #bbb; font-size: 14px; }
.info-bar {
  font-size: 12px; color: #888; margin-bottom: .75rem;
  display: flex; align-items: center; gap: 6px;
}
.dot-live {
  width: 7px; height: 7px; border-radius: 50%; background: #1D9E75;
  animation: pulse 1.5s infinite; flex-shrink: 0;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

.arrival-card {
  border: 1px solid #e8e8e2; border-radius: 10px;
  padding: 11px 14px; display: flex; align-items: center; gap: 10px; margin-bottom: 7px;
}
.arrival-card.first    { border-color: #1D9E75; background: #E1F5EE55; }
.arrival-card.departed { opacity: .45; }
.arrival-num {
  width: 30px; height: 30px; border-radius: 50%; background: #f0f0ea;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; color: #888; flex-shrink: 0;
}
.arrival-card.first .arrival-num { background: #1D9E75; color: #fff; }
.arrival-times { flex: 1; }
.arrival-main { font-size: 17px; font-weight: 600; color: #1a1a1a; }
.arrival-sub  { font-size: 12px; color: #888; margin-top: 2px; }
.badge-route {
  font-size: 11px; background: #E1F5EE; color: #0F6E56;
  padding: 2px 8px; border-radius: 20px; border: 1px solid #9FE1CB; white-space: nowrap;
}
.status { font-size: 13px; white-space: nowrap; }
.status.soon { color: #0F6E56; font-weight: 600; }
.status.mins { color: #1D9E75; font-weight: 500; }
.status.dep  { color: #aaa; }
.no-service { text-align: center; padding: 2rem; color: #aaa; font-size: 14px; line-height: 2; }

/* ===== 時刻表タブ ===== */
.tt-stop-select {
  margin-bottom: 1rem;
}
.tt-stop-select select {
  width: 100%; padding: 9px 12px; font-size: 14px;
  border: 1px solid #d0d0ca; border-radius: 8px;
  background: #fff; color: #1a1a1a; outline: none;
  font-family: inherit; cursor: pointer;
}
.tt-stop-select select:focus { border-color: #1D9E75; }

/* 時刻表：時 | 分 形式 */
.tt-row {
  display: flex; align-items: stretch;
  border-bottom: 1px solid #e8e8e2;
}
.tt-row:first-child { border-top: 1px solid #e8e8e2; }
.tt-hour-col {
  width: 36px; min-width: 36px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; color: #1D9E75;
  border-right: 2px solid #e0e0da;
  padding: 8px 0;
  font-variant-numeric: tabular-nums;
}
.tt-mins-col {
  flex: 1; display: flex; flex-wrap: wrap;
  align-items: center; gap: 2px 0;
  padding: 6px 8px;
}
.tt-cell {
  padding: 4px 7px;
  font-size: 15px; font-variant-numeric: tabular-nums;
  border-radius: 6px;
  background: transparent; cursor: pointer; color: #1a1a1a;
  transition: background .1s;
  position: relative; font-weight: 500;
  min-width: 36px; text-align: center;
}
.tt-cell:hover { background: #E1F5EE; color: #0F6E56; }
.tt-cell.passed { color: #ccc; }
.tt-cell.passed:hover { background: #f5f5f0; color: #bbb; }
.tt-cell.next {
  background: #1D9E75; color: #fff; font-weight: 700;
}
.tt-cell.next:hover { background: #0F6E56; }
.tt-cell[data-general="1"]::after {
  content: "一般";
  position: absolute; top: -5px; right: -3px;
  font-size: 8px; background: #E67E00; color: #fff;
  padding: 1px 3px; border-radius: 3px; font-weight: 700;
}
.tt-cell.next::after {
  content: '次';
  position: absolute; top: -5px; right: -3px;
  font-size: 9px; background: #E24B4A; color: #fff;
  padding: 1px 3px; border-radius: 3px; font-weight: 700;
}
.tt-hour-group { }

/* ===== 到着予想モーダル（overlay不使用・インライン） ===== */
.trip-view { }
.trip-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 1rem;
  padding-bottom: .75rem; border-bottom: 1px solid #eee;
}
.trip-badge {
  background: #1D9E75; color: #fff; font-size: 12px; font-weight: 600;
  padding: 4px 10px; border-radius: 20px; white-space: nowrap;
}
.trip-title { font-size: 15px; font-weight: 600; color: #1a1a1a; }
.trip-sub   { font-size: 12px; color: #888; margin-top: 2px; }

.trip-list { display: flex; flex-direction: column; gap: 0; }
.trip-row {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 0; border-bottom: 1px solid #f0f0ea; position: relative;
}
.trip-row:last-child { border-bottom: none; }
.trip-line-wrap {
  display: flex; flex-direction: column; align-items: center;
  width: 14px; flex-shrink: 0; align-self: stretch;
  padding: 2px 0;
}
.trip-dot {
  width: 10px; height: 10px; border-radius: 50%;
  border: 2px solid #1D9E75; background: #fff; flex-shrink: 0; z-index: 1;
}
.trip-dot.origin { background: #1D9E75; }
.trip-line {
  width: 2px; flex: 1; background: #c8e8dc; margin-top: 2px;
}
.trip-stop { flex: 1; font-size: 14px; color: #1a1a1a; }
.trip-stop.origin { font-weight: 600; }
.trip-time {
  font-size: 15px; font-weight: 600; color: #1D9E75;
  font-variant-numeric: tabular-nums; white-space: nowrap;
}
.trip-time.origin { color: #0F6E56; }
.trip-mins {
  font-size: 11px; color: #888; white-space: nowrap; text-align: right;
  min-width: 36px;
}
</style>
</head>

const TT_STOPS = TIMETABLE_KEYS.slice(0, 23);

/* =====================================================================
   ユーティリティ
   ===================================================================== */
function toKatakana(s) {
  return s.replace(/[\u3041-\u3096]/g, c => String.fromCharCode(c.charCodeAt(0)+0x60));
}
function filterStops(query, mode) {
  if (!query || !query.trim()) return [];
  const q = query.trim();
  const qK = toKatakana(q).toUpperCase();
  const isKana = /^[\u3041-\u3096\u30A1-\u30F6]/.test(q);
  // 重複除去（同名でboarding/altighting違いを除く）用
  const seen = new Set();
  return STOPS.filter(s => {
    if (mode === 'from' && !s.boarding) return false;
    if (mode === 'to'   && !s.alighting) return false;
    const hit = isKana ? s.kana.toUpperCase().startsWith(qK) : s.name.includes(q);
    if (!hit) return false;
    // 同じ表示名が既にあれば除外
    const uniq = s.name + (s._loop2 ? '_帰' : '');
    if (seen.has(uniq)) return false;
    seen.add(uniq);
    return true;
  });
}
function timeToMins(t) {
  const [h,m] = t.split(':').map(Number); return h*60+m;
}
function getNow() {
  const n = new Date(); return n.getHours()*60 + n.getMinutes() + n.getSeconds()/60;
}

// from/to は LOOP_ORDER のキー（_2付きも可）
function canRoute(fromKey, toKey) {
  const fi = LOOP_ORDER.indexOf(fromKey);
  const ti = LOOP_ORDER.indexOf(toKey);
  return fi !== -1 && ti !== -1 && fi < ti;
}

// 停留所名からLOOP_ORDERのキーを得る（乗車/降車フラグに従い正しい方を返す）
function getLoopKey(stopName, mode) {
  const s = STOPS.find(x => x.name === stopName && (mode === 'from' ? x.boarding : x.alighting));
  if (!s) return stopName;
  return s._loop2 ? stopName + '_2' : stopName;
}

function getArrivals(fromKey, toKey) {
  const nowMins = getNow();
  const fTimes  = TIMETABLE[fromKey] || [];
  const tTimes  = TIMETABLE[toKey]   || [];
  const n = Math.min(fTimes.length, tTimes.length);
  const res = [];
  for (let i = 0; i < n; i++) {
    const fm = timeToMins(fTimes[i]);
    const diff = fm - nowMins;
    if (diff >= -1 && diff < 180)
      res.push({fromTime: fTimes[i], toTime: tTimes[i], fromMins: fm, diff, busIdx: i});
  }
  res.sort((a,b) => a.fromMins - b.fromMins);
  return res.slice(0, 5);
}

// 便インデックスから全停留所の到着予想時刻を返す
function getTripTimes(fromKey, busIndex) {
  const fromLoopIdx = LOOP_ORDER.indexOf(fromKey);
  const result = [];
  for (let li = fromLoopIdx; li < LOOP_ORDER.length; li++) {
    const lk = LOOP_ORDER[li];
    const tk = TIMETABLE_KEYS[li];
    const times = TIMETABLE[lk] || TIMETABLE[tk] || [];
    result.push({ stopName: LOOP_DISPLAY[li], time: times[busIndex] || '--', loopKey: lk });
  }
  return result;
}

// ある停留所・時刻の便インデックスを返す
function getBusIndex(loopKey, time) {
  const times = TIMETABLE[loopKey] || [];
  return times.indexOf(time);
}

   ===================================================================== */

  to:   null, toKey:   null,
  fromQuery: '', toQuery: '',
  fromListShown: false, toListShown: false,
  searched: false,
  // 時刻表タブ

  // 到着予想（両タブ共有）
  tripView: false,
  tripFrom: null, tripBusIndex: -1, tripOriginTime: null,
};

/* =====================================================================
   Tab
   ===================================================================== */
function switchTab(t) {
  S.tab = t;
  S.tripView = false;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');
  render();
}

/* =====================================================================
   Render root
   ===================================================================== */
function render() {
  const screen = document.getElementById('screen');
  if (S.tripView) {
    screen.innerHTML = renderTrip();
  } else if (S.tab === 'search') {
    screen.innerHTML = renderSearch();
  } else {
    screen.innerHTML = renderTimetable();
  }
  bindEvents();
}

/* =====================================================================
   接近情報タブ
   ===================================================================== */
function renderSearch() {
  if (S.view === 'result') return renderResult();

  const fromStops = S.fromListShown ? filterStops(S.fromQuery, 'from') : [];
  const toStops   = S.toListShown   ? filterStops(S.toQuery,   'to')   : [];
  const canSearch = !!(S.fromKey && S.toKey && canRoute(S.fromKey, S.toKey));
  const showError = S.searched && S.fromKey && S.toKey && !canRoute(S.fromKey, S.toKey);

  return `
    <div style="margin-bottom:1rem;">
      <div class="step-label">乗車停留所</div>
      <div class="search-row">
        <input id="from-input" type="text" placeholder="停留所名・よみがなを入力" value="${escH(S.fromQuery)}" autocomplete="off">
        <button id="from-btn">検索</button>
      </div>
      ${S.from ? `<div class="selected-stop">
        <div class="stop-dot green"></div>
        <span class="selected-name from">${escH(S.from)}</span>
        <button class="clear-btn" id="clear-from">✕ 変更</button>
      </div>` : ''}
      ${S.fromListShown ? stopListHTML(fromStops, 'from') : ''}
    </div>
    <hr class="divider">
    <div style="margin-bottom:1.25rem;">
      <div class="step-label">降車停留所</div>
      <div class="search-row">
        <input id="to-input" type="text" placeholder="停留所名・よみがなを入力" value="${escH(S.toQuery)}" autocomplete="off">
        <button id="to-btn">検索</button>
      </div>
      ${S.to ? `<div class="selected-stop">
        <div class="stop-dot red"></div>
        <span class="selected-name to">${escH(S.to)}</span>
        <button class="clear-btn" id="clear-to">✕ 変更</button>
      </div>` : ''}
      ${S.toListShown ? stopListHTML(toStops, 'to') : ''}
    </div>
    <button class="search-btn" id="do-search" ${(S.fromKey && S.toKey) ? '' : 'disabled'}>時刻を検索する</button>
    ${showError ? `<div class="error-box">この経路は検索できません。検索しなおしてください。<small>循環の順路上、この方向への直通運行はありません。</small></div>` : ''}
  `;
}

function renderResult() {
  const arrivals = getArrivals(S.fromKey, S.toKey);
  const nowMins  = getNow();
  const cardsHTML = arrivals.length === 0
    ? `<div class="no-service">🚌<br>本日の運行は終了しました<br><small style="font-size:12px;color:#ccc;">翌 7:20 より運行開始</small></div>`
    : arrivals.map((a, i) => {
        const diff = a.diff;
        let sHtml = '', extra = '';
        if (diff >= -1 && diff < 0)   { sHtml = '<span class="status dep">発車済み</span>'; extra = ' departed'; }
        else if (diff < 2)             { sHtml = '<span class="status soon">まもなく到着</span>'; extra = i===0?' first':''; }
        else                           { sHtml = `<span class="status mins">あと ${Math.round(diff)} 分</span>`; extra = i===0?' first':''; }
        const idx = getBusIndex(S.fromKey, a.fromTime);
        return `<div class="arrival-card${extra}">
          <div class="arrival-num">${i+1}</div>
          <div class="arrival-times">
            <div class="arrival-main clickable-time" data-idx="${idx}" data-fromkey="${S.fromKey}" data-time="${a.fromTime}" style="cursor:pointer;text-decoration:underline dotted #1D9E75;">${a.fromTime} 乗車</div>
            <div class="arrival-sub">→ ${a.toTime} 降車${[62,64,66,68,70,72].includes(a.busIdx)?'<br><span style="color:#E67E00;font-size:11px;font-weight:600;">⚠️一般車による運行</span>':""}</div>
          </div>
          <span class="badge-route">青波シティバス</span>
          ${sHtml}
        </div>`;
      }).join('');
  return `
    <button class="back-btn" id="back-btn">← 検索に戻る</button>
    <div class="route-summary">
      <div class="route-chip"><div class="stop-dot green"></div>${escH(S.from)}</div>
      <span class="route-arrow">→</span>
      <div class="route-chip"><div class="stop-dot red"></div>${escH(S.to)}</div>
    </div>
    <div class="info-bar"><div class="dot-live"></div>接近情報（直近5本）<span style="margin-left:auto;font-size:11px;color:#bbb;">時刻をタップで到着予想</span></div>
    ${cardsHTML}
  `;
}

/* =====================================================================
   時刻表タブ
   ===================================================================== */
function renderTimetable() {
  const nowMins  = getNow();
  // S.ttStop は "キー_インデックス" 形式で管理（例: "上市_23"）
  // セレクト value = "キーインデックス" の数値インデックス
  const ttIdx    = parseInt(S.ttStopIdx, 10);
  const ttKey    = TT_STOPS_KEYS[ttIdx];    // TIMETABLE のキー
  const loopKey  = LOOP_ORDER[ttIdx];       // LOOP_ORDER のキー
  const times    = TIMETABLE[ttKey] || [];

  // 時間帯ごとにグループ化
  const byHour = {};
  times.forEach((t, idx) => {
    const h = t.split(':')[0];
    if (!byHour[h]) byHour[h] = [];
    byHour[h].push({t, idx});
  });

  // 次の便
  let nextIdx = -1;
  for (let i = 0; i < times.length; i++) {
    if (timeToMins(times[i]) - nowMins >= 0) { nextIdx = i; break; }
  }

  const rowsHTML = Object.keys(byHour).map(h => {
    const mins = byHour[h].map(({t, idx}) => {
      const diff = timeToMins(t) - nowMins;
      let cls = 'tt-cell';
      if (idx === nextIdx) cls += ' next';
      else if (diff < 0)   cls += ' passed';
      const minStr = t.split(':')[1];
      // 63,65,67,69,71,73便（0始まりインデックス: 62,64,66,68,70,72）は全停留所で一般車
      const GENERAL_BUS_IDX = new Set([62,64,66,68,70,72]);
      const isGeneral = GENERAL_BUS_IDX.has(idx);
      const genAttr = isGeneral ? ' data-general="1" title="一般車による運行"' : '';
      return `<span class="${cls}" data-idx="${idx}" data-ttidx="${ttIdx}" data-loopkey="${loopKey}" data-time="${t}"${genAttr}>${minStr}</span>`;
    }).join('');
    return `<div class="tt-row">
      <div class="tt-hour-col">${h}</div>
      <div class="tt-mins-col">${mins}</div>
    </div>`;
  }).join('');

  const opts = TT_STOPS_LABELS.map((label, i) =>
    `<option value="${i}" ${i===ttIdx?'selected':''}>${escH(label)}</option>`
  ).join('');

  return `
    <div class="tt-stop-select">
      <div class="step-label">停留所を選択</div>
      <select id="tt-stop-sel">${opts}</select>
    </div>
    <div style="font-size:12px;color:#aaa;margin-bottom:.5rem;">分の数字をタップで到着予想表示</div>
    '<div style="display:flex;align-items:center;gap:6px;background:#FFF8E6;border:1px solid #FFDDA0;border-radius:8px;padding:7px 10px;margin-bottom:.75rem;font-size:12px;color:#8A5C00;"><span>⚠️</span><span><strong style="color:#E67E00">一般</strong>バッジ付きの便（63・65・67・69・71・73便）は一般車による運行です</span></div>'
    ${rowsHTML}
  `;
}

/* =====================================================================
   到着予想ビュー（共通）
   ===================================================================== */
function renderTrip() {
  const tripTimes  = getTripTimes(S.tripFrom, S.tripBusIndex);
  const nowMins    = getNow();
  const originTime = S.tripOriginTime;

  const rows = tripTimes.map((row, i) => {
    const m    = timeToMins(row.time);
    const diff = m - nowMins;
    const minsLabel = diff < -1 ? '通過済' : diff < 0 ? '発車済み' : `+${Math.round(m - timeToMins(originTime))}分`;
    return `<div class="trip-row">
      <div class="trip-line-wrap">
        <div class="trip-dot${i===0?' origin':''}"></div>
        ${i < tripTimes.length-1 ? '<div class="trip-line"></div>' : ''}
      </div>
      <div class="trip-stop${i===0?' origin':''}">${escH(row.stopName)}</div>
      <div class="trip-mins">${minsLabel}</div>
      <div class="trip-time${i===0?' origin':''}">${row.time}</div>
    </div>`;
  }).join('');

  return `
    <button class="back-btn" id="trip-back">← 戻る</button>
    <div class="trip-header">
      <div class="trip-badge">青波シティバス</div>
      <div>
        <div class="trip-title">${escH(LOOP_DISPLAY[LOOP_ORDER.indexOf(S.tripFrom)])} ${originTime} 発</div>
        <div class="trip-sub">この先の到着予想時刻${[62,64,66,68,70,72].includes(S.tripBusIndex)?'　<span style="color:#E67E00;font-weight:600;">⚠️による運行</span>':''}</div>
      </div>
    </div>
    <div class="trip-list">${rows}</div>
  `;
}

/* =====================================================================
   共通パーツ
   ===================================================================== */
function stopListHTML(stops, forKey) {
  const dotCls = forKey === 'from' ? 'green' : 'red';
  if (!stops.length) return '<div class="no-result">該当する停留所がありません</div>';
  return `<div class="stop-list">${stops.map(s => {
    const suffix = s._loop2 ? ' <span style="font-size:10px;color:#bbb;">（帰路）</span>' : '';
    return `<div class="stop-item" data-name="${escH(s.name)}" data-loop2="${s._loop2?'1':'0'}" data-for="${forKey}">
      <div class="stop-dot ${dotCls}"></div>
      <span>${escH(s.name)}${suffix}</span>
      <span class="kana">${escH(s.kana)}</span>
    </div>`;
  }).join('')}</div>`;
}
function escH(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* =====================================================================
   Events
   ===================================================================== */
function bindEvents() {
  const get = id => document.getElementById(id);

  /* 接近情報 検索 */
  const attachSearchInput = (inputId, btnId, forKey) => {
    const inp = get(inputId), btn = get(btnId);
    if (!inp || !btn) return;
    const go = () => {
      const q = inp.value;
      if (forKey==='from') { S.fromQuery=q; S.fromListShown=true; }
      else                 { S.toQuery=q;   S.toListShown=true; }
      render();
    };
    btn.addEventListener('click', go);
    inp.addEventListener('keydown', e => { if(e.key==='Enter') go(); });
  };
  attachSearchInput('from-input','from-btn','from');
  attachSearchInput('to-input',  'to-btn',  'to');

  document.querySelectorAll('.stop-item').forEach(el => {
    el.addEventListener('click', () => {
      const name   = el.dataset.name;
      const loop2  = el.dataset.loop2 === '1';
      const loopKey = loop2 ? name+'_2' : name;
      if (el.dataset.for === 'from') {
        S.from = name; S.fromKey = loopKey; S.fromQuery = name; S.fromListShown = false;
      } else {
        S.to   = name; S.toKey   = loopKey; S.toQuery   = name; S.toListShown   = false;
      }
      S.searched = false; render();
    });
  });

  const cf = get('clear-from');
  const ct = get('clear-to');
  if (cf) cf.addEventListener('click', () => { S.from=null; S.fromKey=null; S.fromQuery=''; S.fromListShown=false; S.searched=false; render(); });
  if (ct) ct.addEventListener('click', () => { S.to=null;   S.toKey=null;   S.toQuery='';   S.toListShown=false;   S.searched=false; render(); });

  const ds = get('do-search');
  if (ds) ds.addEventListener('click', () => {
    S.searched = true;
    if (S.fromKey && S.toKey && canRoute(S.fromKey, S.toKey)) { S.view = 'result'; }
    render();
  });

  const bb = get('back-btn');
  if (bb) bb.addEventListener('click', () => { S.view='search'; S.searched=false; render(); });

  /* 接近情報 → 到着予想クリック */
  document.querySelectorAll('.clickable-time').forEach(el => {
    el.addEventListener('click', () => {
      S.tripFrom      = el.dataset.fromkey;
      S.tripBusIndex  = parseInt(el.dataset.idx, 10);
      S.tripOriginTime= el.dataset.time;
      S.tripView      = true;
      render();
    });
  });

  /* 時刻表タブ */
  const ttSel = get('tt-stop-sel');
  if (ttSel) ttSel.addEventListener('change', () => { S.ttStopIdx = parseInt(ttSel.value, 10); render(); });

  document.querySelectorAll('.tt-cell').forEach(el => {
    el.addEventListener('click', () => {
      S.tripFrom       = el.dataset.loopkey;
      S.tripBusIndex   = parseInt(el.dataset.idx, 10);
      S.tripOriginTime = el.dataset.time;
      S.tripView       = true;
      render();
    });
  });

  /* 到着予想 → 戻る */
  const tb = get('trip-back');
  if (tb) tb.addEventListener('click', () => { S.tripView=false; render(); });
}

/* =====================================================================
   Clock & auto-refresh
   ===================================================================== */
function renderClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0')+':'+
    String(n.getMinutes()).padStart(2,'0')+':'+
    String(n.getSeconds()).padStart(2,'0');
}
render();
renderClock();
setInterval(renderClock, 1000);
setInterval(() => {
  if (!S.tripView && (S.view==='result' || S.tab==='tt')) render();
}, 20000);
</script>
</body>
</html>
